<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了 | 株式会社Cozy</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cozy-green: #18E983;
  --cozy-green-dark: #12C46D;
  --cozy-green-light: #E8FFF3;
  --text-primary: #1A1A2E;
  --text-secondary: #4A4A6A;
  --text-light: #8888A0;
  --bg-primary: #FAFBFD;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
  color: var(--text-primary);
  background: linear-gradient(180deg, #F0FFF7 0%, var(--bg-primary) 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  -webkit-font-smoothing: antialiased;
}
.thanks-logo { height: 40px; margin-bottom: 48px; animation: fadeIn 0.6s ease-out; }
.thanks-icon { font-size: 64px; margin-bottom: 24px; animation: fadeIn 0.6s ease-out 0.1s both; }
.thanks-title { font-size: clamp(24px, 4vw, 36px); font-weight: 900; margin-bottom: 16px; animation: fadeIn 0.6s ease-out 0.2s both; }
.thanks-message { font-size: 16px; color: var(--text-secondary); line-height: 2; margin-bottom: 40px; animation: fadeIn 0.6s ease-out 0.3s both; }
.thanks-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--cozy-green); color: #fff;
  font-size: 15px; font-weight: 700;
  padding: 14px 32px; border-radius: 12px;
  text-decoration: none; transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(24,233,131,0.3);
  animation: fadeIn 0.6s ease-out 0.4s both;
}
.thanks-btn:hover { background: var(--cozy-green-dark); transform: translateY(-2px); }
.thanks-auto { font-size: 13px; color: var(--text-light); margin-top: 20px; animation: fadeIn 0.6s ease-out 0.5s both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<img src="logo.png" alt="Cozy" class="thanks-logo">
<div class="thanks-icon">✅</div>
<h1 class="thanks-title">お問い合わせありがとうございます</h1>
<p class="thanks-message">
  お問い合わせを受け付けました。<br>
  通常3営業日以内にご返信いたしますので、<br>
  今しばらくお待ちくださいませ。
</p>
<a href="https://be-cozy.jp" class="thanks-btn">← トップページに戻る</a>
<p class="thanks-auto">10秒後に自動的にトップページに戻ります</p>
<script>
setTimeout(function(){ window.location.href = 'https://be-cozy.jp'; }, 10000);
</script>
</body>
</html>
